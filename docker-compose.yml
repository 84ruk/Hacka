# PostgreSQL para desarrollo (Fase 2+)
# Uso: docker compose up -d
# Puerto 5433 en el host para no chocar con un PostgreSQL local en 5432.
# Conexión: postgresql://postgres:postgres@localhost:5433/auth_db

services:
  db:
    image: postgres:16-alpine
    container_name: hacka-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
